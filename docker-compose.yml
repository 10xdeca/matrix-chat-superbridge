services:
  # --- Reverse Proxy ---
  traefik:
    image: traefik:v3.6
    restart: always
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # HTTP -> HTTPS redirect
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # Let's Encrypt (ACME) — uses HTTP-01 challenge via sslip.io
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt

  # --- Matrix Homeserver ---
  continuwuity:
    image: forgejo.ellis.link/continuwuation/continuwuity:latest
    restart: always
    environment:
      CONTINUWUITY_SERVER_NAME: ${MATRIX_SERVER_NAME}
      CONTINUWUITY_DATABASE_PATH: /var/lib/continuwuity
      CONTINUWUITY_PORT: "6167"
      CONTINUWUITY_ADDRESS: "0.0.0.0"
      CONTINUWUITY_ALLOW_REGISTRATION: "true"
      CONTINUWUITY_REGISTRATION_TOKEN: ${REGISTRATION_TOKEN}
      CONTINUWUITY_ALLOW_FEDERATION: "false"
      CONTINUWUITY_MAX_REQUEST_SIZE: "20971520"
      CONTINUWUITY_NEW_USER_DISPLAYNAME_SUFFIX: ""
      CONTINUWUITY_LOG: "info"
    volumes:
      - continuwuity_data:/var/lib/continuwuity
    ulimits:
      nofile:
        soft: 1048567
        hard: 1048567
    labels:
      - "traefik.enable=true"
      # Client API + federation
      - "traefik.http.routers.matrix.rule=Host(`matrix.${MATRIX_SERVER_NAME}`)"
      - "traefik.http.routers.matrix.entrypoints=websecure"
      - "traefik.http.routers.matrix.tls.certresolver=letsencrypt"
      - "traefik.http.services.matrix.loadbalancer.server.port=6167"
      # Well-known delegation on the base domain
      - "traefik.http.routers.matrix-wellknown.rule=Host(`${MATRIX_SERVER_NAME}`) && PathPrefix(`/.well-known/matrix`)"
      - "traefik.http.routers.matrix-wellknown.entrypoints=websecure"
      - "traefik.http.routers.matrix-wellknown.tls.certresolver=letsencrypt"
      - "traefik.http.routers.matrix-wellknown.service=matrix"
    # Note: the Continuwuity image has no shell utilities (curl, wget),
    # so in-container healthchecks don't work. Bridges retry on their own.

  # --- Element Web Client ---
  element-web:
    image: vectorim/element-web:latest
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.element.rule=Host(`element.${MATRIX_SERVER_NAME}`)"
      - "traefik.http.routers.element.entrypoints=websecure"
      - "traefik.http.routers.element.tls.certresolver=letsencrypt"
      - "traefik.http.services.element.loadbalancer.server.port=80"
    volumes:
      - ./element-config.json:/app/config.json:ro  # Generated by deploy.sh from .template

  # --- Bridges ---
  # Register each via the admin room after first start:
  #   !admin appservices register
  #   <paste registration.yaml contents>
  # Telegram (Python) requires manual bridge bot registration.
  # Discord, Signal, WhatsApp (Go) work without extra steps.

  mautrix-telegram:
    image: dock.mau.dev/mautrix/telegram:latest
    restart: always
    volumes:
      - telegram_data:/data
    depends_on:
      - continuwuity

  mautrix-discord:
    image: dock.mau.dev/mautrix/discord:latest
    restart: always
    volumes:
      - discord_data:/data
    depends_on:
      - continuwuity
    labels:
      - "traefik.enable=true"
      # Discord avatar proxy — used by relay webhooks to display Matrix user avatars
      - "traefik.http.routers.discord-avatar.rule=Host(`matrix.${MATRIX_SERVER_NAME}`) && PathPrefix(`/mautrix-discord`)"
      - "traefik.http.routers.discord-avatar.entrypoints=websecure"
      - "traefik.http.routers.discord-avatar.tls.certresolver=letsencrypt"
      - "traefik.http.services.discord-avatar.loadbalancer.server.port=29334"

  mautrix-signal:
    image: dock.mau.dev/mautrix/signal:latest
    restart: always
    volumes:
      - signal_data:/data
    depends_on:
      - continuwuity

  mautrix-whatsapp:
    image: dock.mau.dev/mautrix/whatsapp:latest
    restart: always
    volumes:
      - whatsapp_data:/data
    depends_on:
      - continuwuity

  # Relay appservice — bridges megabridge portal rooms (WhatsApp, Signal, etc.)
  # into the superbridge hub room using puppet users for sender attribution.
  # Register relay/registration.yaml via the admin room before first start.
  relay-bot:
    build: ./relay
    restart: always
    environment:
      RELAY_HOMESERVER_URL: http://continuwuity:6167
      RELAY_DOMAIN: ${MATRIX_SERVER_NAME}
      RELAY_AS_TOKEN: ${RELAY_AS_TOKEN}
      RELAY_HS_TOKEN: ${RELAY_HS_TOKEN}
      RELAY_PORTAL_ROOMS: ${PORTAL_ROOMS:-}
      RELAY_HUB_ROOM_ID: ${HUB_ROOM_ID}
      RELAY_DB_PATH: /data/relay.db
      RELAY_LOG_LEVEL: ${RELAY_LOG_LEVEL:-INFO}
      RELAY_DOUBLE_PUPPETS: ${RELAY_DOUBLE_PUPPETS:-}
    volumes:
      - relay_data:/data
    depends_on:
      - continuwuity

volumes:
  traefik_letsencrypt:
  continuwuity_data:
  telegram_data:
  discord_data:
  signal_data:
  whatsapp_data:
  relay_data:
